# Dependabot — auto PRs for dependency updates.
# Spec: docs/DEVELOPMENT_PLAN.md §0 (engineering hygiene)
#
# We group most updates by ecosystem so we don't drown in tiny PRs. Major
# updates remain separate so they get explicit review.

version: 2
updates:
  - package-ecosystem: npm
    directory: '/'
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      typescript:
        patterns:
          - 'typescript'
          - '@types/*'
          - 'typescript-eslint'
        update-types:
          - 'minor'
          - 'patch'
      eslint:
        patterns:
          - 'eslint'
          - '@eslint/*'
        update-types:
          - 'minor'
          - 'patch'
      testing:
        patterns:
          - 'vitest'
          - '@vitest/*'
        update-types:
          - 'minor'
          - 'patch'
      react:
        patterns:
          - 'react'
          - 'react-dom'
          - '@types/react'
          - '@types/react-dom'
        update-types:
          - 'minor'
          - 'patch'

  - package-ecosystem: github-actions
    directory: '/'
    schedule:
      interval: weekly
