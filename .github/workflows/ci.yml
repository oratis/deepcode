name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Typecheck + Lint + Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint
        continue-on-error: true # M0: lint 配置随 M1 完善，先不阻塞

      - name: Format check
        run: pnpm format:check

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

  link-check:
    name: Docs link check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Verify required docs exist
        run: |
          for f in README.md CONTRIBUTING.md SECURITY.md \
                   docs/DEVELOPMENT_PLAN.md docs/VISUAL_DESIGN.html \
                   docs/design/sandbox-plan-worktree.md \
                   docs/design/plugin-security.md \
                   docs/design/effort-levels.md; do
            test -f "$f" || { echo "MISSING: $f"; exit 1; }
          done
          echo "All M0 docs present"
